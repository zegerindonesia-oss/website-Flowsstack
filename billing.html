<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Billing - FlowStack</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .sidebar-link.active {
            background: rgba(134, 85, 246, 0.1);
            color: #8655f6;
        }
    </style>
</head>

<body class="bg-[#f8f7fa] text-[#131118]">
    <!-- Navbar -->
    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 h-16 flex items-center justify-between px-6">
        <a href="/" class="flex items-center gap-3">
            <div class="size-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined text-[24px]">layers</span>
            </div>
            <span
                class="font-heading text-xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">FlowStack</span>
        </a>
    </nav>

    <div class="flex pt-16 min-h-screen">
        <aside class="w-64 border-r border-gray-100 bg-white hidden md:block">
            <div class="p-4 space-y-2">
                <a href="/dashboard.html"
                    class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition-all">
                    <span class="material-symbols-outlined">dashboard</span>
                    Dashboard
                </a>
                <a href="/apps.html"
                    class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition-all">
                    <span class="material-symbols-outlined">apps</span>
                    My Apps
                </a>
                <a href="/billing.html"
                    class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all">
                    <span class="material-symbols-outlined">payments</span>
                    Billing
                </a>
                <a href="/account.html"
                    class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition-all">
                    <span class="material-symbols-outlined">person</span>
                    Account
                </a>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <header class="mb-10">
                <h1 class="font-heading text-3xl font-bold text-gray-900 mb-2">Billing & Purchases</h1>
                <p class="text-gray-500">View your transaction history and manage subscriptions.</p>
            </header>

            <!-- Purchase History Card -->
            <section class="glass-card rounded-3xl overflow-hidden shadow-sm">
                <div class="p-6 border-b border-gray-100 bg-white/50">
                    <h2 class="font-bold text-lg">Purchase History</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50 text-gray-400 text-xs uppercase font-bold tracking-wider">
                                <th class="px-6 py-4">Product</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4">Amount</th>
                                <th class="px-6 py-4">Date</th>
                            </tr>
                        </thead>
                        <tbody id="purchase-history-body" class="divide-y divide-gray-100">
                            <!-- History will be injected here -->
                            <tr>
                                <td colspan="4" class="px-6 py-10 text-center text-gray-400">Loading history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Credit Info (Future) -->
            <div class="mt-8 p-6 bg-purple-50 rounded-2xl border border-purple-100 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="size-12 rounded-xl bg-purple-600 text-white flex items-center justify-center">
                        <span class="material-symbols-outlined">stars</span>
                    </div>
                    <div>
                        <p class="font-bold">Remaining Credits</p>
                        <p class="text-sm text-purple-600">Coming soon in the next update</p>
                    </div>
                </div>
                <span class="text-2xl font-bold text-gray-300">0</span>
            </div>
        </main>
    </div>

    <script type="module" src="/src/billing.js"></script>
</body>

</html>
