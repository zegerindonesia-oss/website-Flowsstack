<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Register - FlowStack</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-heading { font-family: 'Outfit', sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body class="bg-[#f8f7fa] flex items-center justify-center min-h-screen p-6">
  <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-xl">
    <div class="text-center mb-8">
      <div class="size-12 rounded-xl bg-purple-100 flex items-center justify-center text-purple-600 mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layers"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.13a2 2 0 0 0 0 3.74l8.57 3.95a2 2 0 0 0 1.66 0l8.57-3.95a2 2 0 0 0 0-3.74Z"/><path d="m2.6 14.13 8.57 3.95a2 2 0 0 0 1.66 0l8.57-3.95a2 2 0 0 0 0-3.74"/><path d="m2.6 18.13 8.57 3.95a2 2 0 0 0 1.66 0l8.57-3.95a2 2 0 0 0 0-3.74"/></svg>
      </div>
      <h1 class="font-heading text-3xl font-bold text-gray-900">Create Account</h1>
      <p class="text-gray-500 mt-2">Join the FlowStack ecosystem today.</p>
    </div>

    <form id="register-form" class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
        <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all outline-none" placeholder="Jenny Doe">
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
        <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all outline-none" placeholder="jenny@example.com">
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
        <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all outline-none" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-purple-200 transition-all transform hover:-translate-y-0.5 mt-2">
        Sign Up
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
      <p class="text-gray-500 text-sm">Already have an account? <a href="/login.html" class="text-purple-600 font-bold hover:underline">Login here</a></p>
    </div>
  </div>

  <script type="module" src="/src/register.js"></script>
</body>
</html>
