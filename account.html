<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Account - FlowStack</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .sidebar-link.active {
            background: rgba(134, 85, 246, 0.1);
            color: #8655f6;
        }
    </style>
</head>

<body class="bg-[#f8f7fa] text-[#131118]">
    <!-- Navbar -->
    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 h-16 flex items-center justify-between px-6">
        <a href="/" class="flex items-center gap-3">
            <div class="size-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined text-[24px]">layers</span>
            </div>
            <span
                class="font-heading text-xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">FlowStack</span>
        </a>
        <div class="flex items-center gap-4">
            <button id="logout-btn"
                class="size-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-700 hover:bg-red-50 hover:text-red-600 transition-all">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </nav>

    <div class="flex pt-16 min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-gray-100 bg-white hidden md:block">
            <div class="p-4 space-y-2">
                <a href="/dashboard.html"
                    class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition-all">
                    <span class="material-symbols-outlined">dashboard</span>
                    Dashboard
                </a>
                <a href="/apps.html"
                    class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition-all">
                    <span class="material-symbols-outlined">apps</span>
                    My Apps
                </a>
                <a href="/billing.html"
                    class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition-all">
                    <span class="material-symbols-outlined">payments</span>
                    Billing
                </a>
                <a href="/account.html"
                    class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all">
                    <span class="material-symbols-outlined">person</span>
                    Account
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-10 max-w-4xl">
            <header class="mb-10">
                <h1 class="font-heading text-3xl font-bold text-gray-900 mb-2">Account Settings</h1>
                <p class="text-gray-500">Manage your profile and security settings.</p>
            </header>

            <div class="space-y-8">
                <!-- Profile Section -->
                <section class="glass-card p-8 rounded-3xl">
                    <h2 class="font-heading text-xl font-bold mb-6">Profile Information</h2>
                    <form id="profile-form" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
                                <input type="text" id="acc-name"
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                                <input type="email" id="acc-email" disabled
                                    class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-400 cursor-not-allowed">
                            </div>
                        </div>
                        <button type="submit"
                            class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-8 py-3 rounded-xl shadow-lg transition-all mt-4">
                            Save Changes
                        </button>
                    </form>
                </section>

                <!-- Password Section -->
                <section class="glass-card p-8 rounded-3xl">
                    <h2 class="font-heading text-xl font-bold mb-6">Security</h2>
                    <form id="password-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">New Password</label>
                            <input type="password" id="new-password" placeholder="••••••••"
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all outline-none">
                        </div>
                        <p class="text-xs text-gray-400 italic">Leave blank if you don't want to change it.</p>
                        <button type="submit"
                            class="bg-gray-800 hover:bg-black text-white font-bold px-8 py-3 rounded-xl shadow-lg transition-all mt-4">
                            Update Password
                        </button>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="/src/account.js"></script>
</body>

</html>
