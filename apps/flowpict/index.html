<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>FlowPict - FlowStack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>

<body>
    <div id="content">
        <div class="flex items-center justify-center min-h-screen bg-white">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
        </div>
    </div>

    <script type="module">
        import { protectApp } from '/src/platform/access-control.js';

        // Protect this app (flowpict)
        protectApp('flowpict');

        // If authorized, the protectApp will NOT clear the screen.
        // However, protectApp as currently written clears document.body.innerHTML on failure.
        // We need to handle the success case to actually load the iframe.

        import { subscribeToAuthChanges } from '/src/firebase/auth.js';
        import { checkProductOwnership } from '/src/platform/access-control.js';

        subscribeToAuthChanges(async (user) => {
            if (user) {
                const isOwned = await checkProductOwnership(user.uid, 'flowpict');
                if (isOwned) {
                    // Load the actual tool in an iframe
                    document.getElementById('content').innerHTML = `
                    <iframe src="/products/flowpict/app.html" title="FlowPict App"></iframe>
                `;
                }
            }
        });
    </script>
</body>

</html>
